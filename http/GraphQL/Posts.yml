info:
  name: Posts
  type: graphql
  seq: 3

graphql:
  method: GET
  url: "{{host}}"
  body:
    query: |
      query Posts {
        posts {
          id
          title
          description
          contentUrl
          likes
          authorId
          createdAt
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
