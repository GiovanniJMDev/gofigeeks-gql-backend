info:
  name: Get users by id
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{host}}"
  body:
    query: |
      query Hello {
        hello,
        users {
          id
          name
          email
          biography
        }}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
